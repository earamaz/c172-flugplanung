const b64d=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function decrypt(pw){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64d(P.salt),iterations:P.iter,hash:"SHA-256"},
    km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(P.iv)},key,b64d(P.data));
  return new TextDecoder().decode(pt);
}
function render(html){document.open();document.write(html);document.close();}
async function go(){
  const pw=document.getElementById("pw").value;
  document.getElementById("err").textContent="";
  try{const html=await decrypt(pw); sessionStorage.setItem("c172k",pw); render(html);}
  catch(e){document.getElementById("err").textContent="Falsches Passwort.";}
}
document.getElementById("go").onclick=go;
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")go();});
// im selben Tab bereits entsperrt? -> automatisch öffnen
(async()=>{const s=sessionStorage.getItem("c172k"); if(s){try{render(await decrypt(s));}catch(e){sessionStorage.removeItem("c172k");}}})();
